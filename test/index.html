<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video.js + FastPix data SDK test</title>
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.21.0/dist/video-js.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.5;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    .hint {
      font-size: 0.875rem;
      color: #555;
      margin: 0 0 1rem;
    }
    .player-wrap {
      max-width: 960px;
      margin: 0 auto;
    }
    .video-js {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <h1>Video.js + FastPix monitor</h1>
    <p class="hint">Run <code>npm run build</code> so <code>../dist/index.js</code> exists. Replace <code>YOUR_WORKSPACE_KEY</code> with your workspace key from the FastPix dashboard.</p>
    <video
      id="video-player"
      class="video-js vjs-big-play-centered"
      controls
      playsinline
      preload="auto"
      poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg">
      <source src="https://stream.fastpix.io/2125094c-db43-4748-90e1-18539f2ccf98.m3u8" type="application/x-mpegURL">
      <p class="vjs-no-js">
        To view this video please enable JavaScript, and consider upgrading to a web browser that
        <a href="https://videojs.com/html5-video-support/" target="_blank" rel="noreferrer">supports HTML5 video</a>.
      </p>
    </video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/video.js@8.21.0/dist/video.min.js"></script>
  <script src="../dist/index.js"></script>
  <script>
    (function () {
      var el = document.getElementById('video-player');
      var initVideoJsTracking = typeof window !== 'undefined' && window.initVideoJsTracking;

      if (!el || typeof videojs === 'undefined') return;
      if (!initVideoJsTracking) {
        console.warn('FastPix SDK not loaded. Run npm run build and ensure ../dist/index.js is served.');
        videojs(el, { fluid: true, responsive: true });
        return;
      }

      var initializationTime = initVideoJsTracking.utilityMethods.now();

      var videojsInstance = videojs(el, {
        fluid: true,
        responsive: true,
      });

      var data = {
        workspace_id: 'YOUR_WORKSPACE_KEY',
        player_name: 'test-page-player',
        player_init_time: initializationTime,
        video_title: 'FastPix sample HLS',
        video_id: 'specific-video-id',
        viewer_id: 'test-viewer',
      };

      initVideoJsTracking(videojsInstance, {
        debug: true,
        videojs: videojs,
        disableCookies: true,
        respectDoNotTrack: true,
        automaticErrorTracking: true,
        data: data,
      });

      videojsInstance.ready(function () {
        console.log('Video.js ready', videojs.VERSION);
      });
    })();
  </script>
</body>
</html>
